name: Wiley.co CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore WileyCoWeb.slnx

      - name: Build
        run: dotnet build WileyCoWeb.slnx --configuration Release --no-restore

      - name: Run tests (when you add them)
        run: dotnet test WileyCoWeb.slnx --configuration Release --no-build --verbosity normal
        continue-on-error: true

      - name: Publish for Amplify
        run: dotnet publish WileyCoWeb.csproj -c Release -o publish_output --no-restore

      - name: Upload build artifact for Amplify
        uses: actions/upload-artifact@v4
        with:
          name: blazor-publish
          path: publish_output/wwwroot
