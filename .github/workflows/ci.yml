name: Wiley.co CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: wiley-co-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # required for GitHub OIDC — deployment-guard assumes role via federation

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: component
            project: tests/WileyCoWeb.ComponentTests/WileyCoWeb.ComponentTests.csproj
          - name: integration
            project: tests/WileyCoWeb.IntegrationTests/WileyCoWeb.IntegrationTests.csproj
          - name: widget
            project: tests/WileyWidget.Tests/WileyWidget.Tests.csproj
          - name: e2e
            project: tests/WileyCoWeb.E2ETests/WileyCoWeb.E2ETests.csproj
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      SYNCFUSION_LICENSE_KEY: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET 9.0.313
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.313

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.project }} --locked-mode

      - name: Build
        run: dotnet build ${{ matrix.project }} --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Run tests with coverage
        run: dotnet test ${{ matrix.project }} --configuration Release --no-build --no-restore --verbosity normal --settings coverlet.runsettings --collect:"XPlat Code Coverage" --results-directory TestResults/${{ matrix.name }} --blame-hang-timeout 5m --blame-hang-dump-type full --blame-crash-dump-type full

      - name: Generate source coverage summary
        if: matrix.name != 'e2e'
        shell: pwsh
        run: |
          $resultsDirectory = Join-Path "TestResults" "${{ matrix.name }}"
          $coverageReport = Get-ChildItem -Path $resultsDirectory -Recurse -Filter coverage.cobertura.xml |
            Sort-Object FullName |
            Select-Object -First 1

          if (-not $coverageReport) {
            throw "Coverage report was not generated for ${{ matrix.project }}."
          }

          [xml]$coverageXml = Get-Content -Path $coverageReport.FullName -Raw
          $coveragePercent = [math]::Round(([double]$coverageXml.DocumentElement.'line-rate' * 100), 2)

          $sourceLineRows = foreach ($package in @($coverageXml.coverage.packages.package)) {
            foreach ($class in @($package.classes.class)) {
              $filename = [string]$class.filename
              if ([string]::IsNullOrWhiteSpace($filename)) {
                continue
              }

              if ($filename -like 'tests/*' -or $filename -like 'tests\*') {
                continue
              }

              foreach ($line in @($class.lines.line)) {
                [pscustomobject]@{
                  File = $filename.Replace('\\', '/')
                  LineNumber = [int]$line.number
                  Hits = [int]$line.hits
                }
              }
            }
          }

          $sourceCoverageCsv = Join-Path $resultsDirectory 'source-coverage-summary.csv'
          $sourceCoverageMarkdown = Join-Path $resultsDirectory 'source-coverage-summary.md'

          if (-not $sourceLineRows) {
            @(
              '# Source Coverage Summary',
              '',
              "No production source lines were instrumented for `${{ matrix.name }}`.",
              '',
              "Project line coverage: $coveragePercent%"
            ) | Set-Content -Path $sourceCoverageMarkdown

            [pscustomobject]@{
              File = '(no production source files instrumented)'
              LineRate = 0
              LinesCovered = 0
              LinesValid = 0
            } | Export-Csv -Path $sourceCoverageCsv -NoTypeInformation
          }
          else {
            $sourceCoverageSummary = $sourceLineRows |
              Group-Object File, LineNumber |
              ForEach-Object {
                $sample = $_.Group[0]
                [pscustomobject]@{
                  File = $sample.File
                  LineNumber = $sample.LineNumber
                  Hits = ($_.Group | Measure-Object -Property Hits -Maximum).Maximum
                }
              } |
              Group-Object File |
              ForEach-Object {
                $valid = $_.Count
                $covered = (@($_.Group | Where-Object Hits -gt 0)).Count
                [pscustomobject]@{
                  File = $_.Name
                  LineRate = [math]::Round(($covered / [double]$valid) * 100, 2)
                  LinesCovered = $covered
                  LinesValid = $valid
                }
              } |
              Sort-Object LineRate, File

            $sourceCoverageSummary | Export-Csv -Path $sourceCoverageCsv -NoTypeInformation

            $topUncoveredRows = $sourceCoverageSummary |
              Select-Object -First 25 |
              ForEach-Object { "| $($_.File) | $($_.LineRate)% | $($_.LinesCovered) | $($_.LinesValid) |" }

            @(
              '# Source Coverage Summary',
              '',
              "Project line coverage: $coveragePercent%",
              '',
              '| File | Line Coverage | Covered Lines | Valid Lines |',
              '| --- | ---: | ---: | ---: |'
            ) + $topUncoveredRows | Set-Content -Path $sourceCoverageMarkdown
          }

          if ($env:GITHUB_STEP_SUMMARY) {
            Get-Content -Path $sourceCoverageMarkdown | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }

      - name: Report coverage (no gate)
        if: matrix.name != 'e2e'
        shell: pwsh
        run: |
          $resultsDirectory = Join-Path "TestResults" "${{ matrix.name }}"
          $coverageReport = Get-ChildItem -Path $resultsDirectory -Recurse -Filter coverage.cobertura.xml |
            Sort-Object FullName |
            Select-Object -First 1

          if (-not $coverageReport) {
            Write-Host "No coverage report found for ${{ matrix.name }} — skipping."
            exit 0
          }

          [xml]$coverageXml = Get-Content -Path $coverageReport.FullName -Raw
          $coveragePercent = [math]::Round(([double]$coverageXml.DocumentElement.'line-rate' * 100), 2)
          Write-Host "${{ matrix.name }} line coverage: $coveragePercent% (gate removed)"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.name }}
          path: |
            TestResults/${{ matrix.name }}/**/coverage.cobertura.xml
            TestResults/${{ matrix.name }}/source-coverage-summary.csv
            TestResults/${{ matrix.name }}/source-coverage-summary.md
          if-no-files-found: warn

  build-and-publish:
    runs-on: windows-latest
    needs: test
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      SYNCFUSION_LICENSE_KEY: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET 9.0.313
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.313

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore WileyCoWeb.slnx --locked-mode

      - name: Build
        run: dotnet build WileyCoWeb.slnx --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Publish for Amplify
        run: dotnet publish WileyCoWeb.csproj -c Release -o publish_output --no-restore -p:ContinuousIntegrationBuild=true

      - name: Upload build artifact for Amplify
        uses: actions/upload-artifact@v7
        with:
          name: blazor-publish
          path: publish_output/wwwroot

  playwright-ui:
    runs-on: windows-latest
    needs: build-and-publish
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      SYNCFUSION_LICENSE_KEY: ${{ secrets.SYNCFUSION_LICENSE_KEY }}
      PLAYWRIGHT_HTML_OPEN: never

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET 9.0.313
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.313

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore .NET dependencies
        run: dotnet restore WileyCoWeb.slnx --locked-mode

      - name: Build .NET projects (pre-build for --no-build server startup)
        run: dotnet build WileyCoWeb.slnx --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Restore Node dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ${{ env.LOCALAPPDATA }}\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npm run playwright:install

      - name: Run Node Playwright UI suite
        run: npm run playwright:test:ci

      - name: Enforce Playwright pass-rate gate
        run: node ./Scripts/assert-playwright-results.mjs

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-ui-report
          path: |
            playwright-report
            test-results
          if-no-files-found: warn

  deployment-guard:
    runs-on: ubuntu-latest
    needs: [build-and-publish, playwright-ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::570912405222:role/wiley-co-github-ci
          aws-region: us-east-2

      - name: Fail if latest Amplify main job is unhealthy
        run: |
          set -euo pipefail
          latest_status="$(aws amplify list-jobs --app-id d2ellat1y3ljd9 --branch-name main --max-items 1 --query 'jobSummaries[0].status' --output text)"
          if [ -z "$latest_status" ] || [ "$latest_status" = "None" ]; then
            echo "Unable to resolve the latest Amplify main job status."
            exit 1
          fi
          echo "Latest Amplify main job status: $latest_status"
          if [ "$latest_status" = "FAILED" ] || [ "$latest_status" = "CANCELLED" ]; then
            echo "Amplify main latest job is $latest_status. Failing deployment guard."
            exit 1
          fi

      - name: Fail if live Syncfusion settings endpoint returns 404
        run: |
          set -euo pipefail
          status_code="$(curl -s -o /dev/null -w '%{http_code}' https://wileywidget.townofwiley.gov/appsettings.Syncfusion.local.json)"
          echo "Live appsettings.Syncfusion.local.json status: $status_code"
          if [ "$status_code" = "404" ]; then
            echo "Live endpoint returned 404 for appsettings.Syncfusion.local.json. Failing deployment guard."
            exit 1
          fi
