name: Wiley.co CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: wiley-co-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: component
            project: tests/WileyCoWeb.ComponentTests/WileyCoWeb.ComponentTests.csproj
          - name: integration
            project: tests/WileyCoWeb.IntegrationTests/WileyCoWeb.IntegrationTests.csproj
          - name: widget
            project: tests/WileyWidget.Tests/WileyWidget.Tests.csproj
          - name: e2e
            project: tests/WileyCoWeb.E2ETests/WileyCoWeb.E2ETests.csproj
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0.312
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.312

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.project }} --locked-mode

      - name: Build
        run: dotnet build ${{ matrix.project }} --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Run tests with coverage
        run: dotnet test ${{ matrix.project }} --configuration Release --no-build --verbosity normal --settings coverlet.runsettings --collect:"XPlat Code Coverage" --results-directory TestResults/${{ matrix.name }}

      - name: Enforce coverage threshold
        shell: pwsh
        run: |
          $thresholds = @{
            component = 68
            integration = 11
            widget = 32
            e2e = 0
          }

          $resultsDirectory = Join-Path "TestResults" "${{ matrix.name }}"
          $coverageReport = Get-ChildItem -Path $resultsDirectory -Recurse -Filter coverage.cobertura.xml |
            Sort-Object FullName |
            Select-Object -First 1

          if (-not $coverageReport) {
            throw "Coverage report was not generated for ${{ matrix.project }}."
          }

          [xml]$coverageXml = Get-Content -Path $coverageReport.FullName -Raw
          $coveragePercent = [math]::Round(([double]$coverageXml.DocumentElement.'line-rate' * 100), 2)
          $threshold = $thresholds['${{ matrix.name }}']

          Write-Host "${{ matrix.name }} line coverage: $coveragePercent% (threshold $threshold%)"

          if ($threshold -eq 0) {
            Write-Host "E2E coverage is reported separately because browser-only runs do not instrument app code in-process."
            exit 0
          }

          if ($coveragePercent -lt $threshold) {
            throw "Coverage gate failed for ${{ matrix.name }}: $coveragePercent% < $threshold%."
          }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.name }}
          path: TestResults/${{ matrix.name }}/**/coverage.cobertura.xml
          if-no-files-found: warn

  build-and-publish:
    runs-on: windows-latest
    needs: test
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0.312
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.312

      - name: Restore dependencies
        run: dotnet restore WileyCoWeb.slnx --locked-mode

      - name: Build
        run: dotnet build WileyCoWeb.slnx --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Publish for Amplify
        run: dotnet publish WileyCoWeb.csproj -c Release -o publish_output --no-restore -p:ContinuousIntegrationBuild=true

      - name: Upload build artifact for Amplify
        uses: actions/upload-artifact@v4
        with:
          name: blazor-publish
          path: publish_output/wwwroot
