version: 1
frontend:
  phases:
    preBuild:
      commands:
        - curl -fsSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
        - bash dotnet-install.sh --channel 9.0 --install-dir $HOME/.dotnet
        - export PATH="$HOME/.dotnet:$PATH"
        - dotnet --version
        - dotnet restore WileyCoWeb.slnx
    build:
      commands:
        - export PATH="$HOME/.dotnet:$PATH"
        - |
          read_secret_field() {
            local key="$1"
            KEY="$key" node -e 'const key = process.env.KEY || ""; const normalize = value => typeof value === "string" ? value.trim().replace(/^"|"$/g, "").trim() : ""; const raw = process.env.secrets || "{}"; try { const parsed = JSON.parse(raw); process.stdout.write(normalize(parsed[key])); } catch { process.stdout.write(""); }'
          }

          read_syncfusion_key_from_secret_string() {
            local raw="$1"
            SECRET_STRING="$raw" node -e 'const normalize = value => typeof value === "string" ? value.trim().replace(/^"|"$/g, "").trim() : ""; const rawValue = process.env.SECRET_STRING || ""; try { const parsed = JSON.parse(rawValue); process.stdout.write(normalize(parsed.SYNCFUSION_LICENSE_KEY || parsed.SyncfusionLicenseKey || rawValue)); } catch { process.stdout.write(normalize(rawValue)); }'
          }

          export SYNCFUSION_LICENSE_KEY="$(printf '%s' "${SYNCFUSION_LICENSE_KEY:-}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -n "$SYNCFUSION_LICENSE_KEY" ]; then
            echo "Using pre-configured SYNCFUSION_LICENSE_KEY from Amplify branch environment variables."
          elif secret_string="$(aws secretsmanager get-secret-value --secret-id "SYNCFUSION_LICENSE_KEY" --query SecretString --output text 2>/dev/null)"; then
            export SYNCFUSION_LICENSE_KEY="$(read_syncfusion_key_from_secret_string "$secret_string")"
            echo "Loaded SYNCFUSION_LICENSE_KEY from AWS Secrets Manager secret SYNCFUSION_LICENSE_KEY."
          else
            export SYNCFUSION_LICENSE_KEY="$(read_secret_field SYNCFUSION_LICENSE_KEY)"
            if [ -n "$SYNCFUSION_LICENSE_KEY" ]; then
              echo "Loaded SYNCFUSION_LICENSE_KEY from Amplify environment secrets."
            else
              echo "ERROR: SYNCFUSION_LICENSE_KEY was not found in AWS Secrets Manager secret SYNCFUSION_LICENSE_KEY or Amplify environment secrets."
              exit 1
            fi
          fi

          export SYNCFUSION_LICENSE_KEY="$(printf '%s' "${SYNCFUSION_LICENSE_KEY:-}" | tr -d '\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "$SYNCFUSION_LICENSE_KEY" ]; then
            echo "ERROR: SYNCFUSION_LICENSE_KEY resolved to an empty value after normalization."
            exit 1
          fi

          echo "Generating wwwroot/appsettings.Syncfusion.local.json from Amplify secret/SYNCFUSION_LICENSE_KEY for Syncfusion Blazor (prevents license popup in deployed client)."
          mkdir -p wwwroot
          printf '{"SyncfusionLicenseKey":"%s"}' "$SYNCFUSION_LICENSE_KEY" > wwwroot/appsettings.Syncfusion.local.json
          echo "Syncfusion client license file generated successfully. xAI key is configured server-side via AWS Secrets Manager in WileyCoWeb.Api/Program.cs (SYNCFUSION_API_KEY for MCP is set in IDE environment per .github/copilot-instructions.md)."

          export COGNITO_USER_POOL_ID="${COGNITO_USER_POOL_ID:-$(read_secret_field COGNITO_USER_POOL_ID)}"
          export COGNITO_APP_CLIENT_ID="${COGNITO_APP_CLIENT_ID:-$(read_secret_field COGNITO_APP_CLIENT_ID)}"

          # Amplify hardening per plan and Amazon Q evaluation: set portal URL + load xAI key from AWS Secrets Manager "Grok" (unifies with Program.cs ConfigureXaiSecretAsync; node parser matches existing Syncfusion pattern to avoid jq in build image)
          export WILEY_WORKSPACE_API_BASE_ADDRESS="https://w544vrvb3i.execute-api.us-east-2.amazonaws.com/prod"
          if secret_string="$(aws secretsmanager get-secret-value --secret-id "Grok" --query SecretString --output text 2>/dev/null)"; then
            export XAI_API_KEY="$(node -e '
              const raw = process.env.secret_string || "{}";
              try {
                const parsed = typeof raw === "string" ? JSON.parse(raw) : raw;
                const key = parsed.XAI_API_KEY || parsed.ApiKey || parsed.XaiApiKey || parsed.GrokApiKey || parsed.secret || raw.toString();
                process.stdout.write(key.trim());
              } catch(e) {
                process.stdout.write(raw.toString().trim());
              }
            ')"
            echo "Loaded XAI_API_KEY from AWS Secrets Manager secret 'Grok' for Jarvis/Grok portal."
          fi
          export COGNITO_REGION="${COGNITO_REGION:-$(read_secret_field COGNITO_REGION)}"

          if [ -n "$COGNITO_USER_POOL_ID$COGNITO_APP_CLIENT_ID$COGNITO_REGION" ]; then
            if [ -z "$COGNITO_USER_POOL_ID" ] || [ -z "$COGNITO_APP_CLIENT_ID" ] || [ -z "$COGNITO_REGION" ]; then
              echo "ERROR: Incomplete Cognito configuration detected. Provide all of COGNITO_USER_POOL_ID, COGNITO_APP_CLIENT_ID, and COGNITO_REGION, or leave all unset."
              exit 1
            fi

            echo "Validated Cognito environment configuration for Amplify build."
          else
            echo "Cognito environment secrets are not configured; continuing without hosted auth variables."
          fi

        - dotnet publish WileyCoWeb.csproj -c Release -o publish_output --no-restore
  artifacts:
    baseDirectory: publish_output/wwwroot
    files:
      - "**/*"
  cache:
    paths:
      - $HOME/.nuget/packages/**/*
