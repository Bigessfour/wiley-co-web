<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <!--
      Early dark-mode detection: runs synchronously before CSS and Blazor load
      so the page never flickers from light to dark on first paint.

      Sets two attributes on <html>:
        data-wiley-theme="dark" | "light"  — consumed by our app.css selectors
        data-bs-theme="dark"   | "light"  — consumed by Bootstrap 5 vars which
                                            Syncfusion Bootstrap5 theme inherits

      A matchMedia listener keeps both attributes in sync if the OS theme
      changes while the app is open (e.g. auto-dark scheduling on macOS/iOS).
    -->
    <script>
      (function () {
        try {
          var mq =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)");
          var theme = mq && mq.matches ? "dark" : "light";
          document.documentElement.setAttribute("data-wiley-theme", theme);
          document.documentElement.setAttribute("data-bs-theme", theme);
          var handleThemeChange = function (e) {
            var t = e.matches ? "dark" : "light";
            document.documentElement.setAttribute("data-wiley-theme", t);
            document.documentElement.setAttribute("data-bs-theme", t);
          };
          if (mq) {
            if (typeof mq.addEventListener === "function") {
              mq.addEventListener("change", handleThemeChange);
            } else if (typeof mq.addListener === "function") {
              mq.addListener(handleThemeChange);
            }
          }
        } catch (ex) {
          /* Non-fatal: theme defaults to light if matchMedia is unavailable */
        }
      })();
    </script>
    <script>
      tailwind = {
        config: {
          corePlugins: {
            preflight: false,
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="_content/Syncfusion.Blazor.Themes/bootstrap5.css"
    />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="WileyCoWeb.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>

  <body>
    <div id="app">
      <div

      >
        <div class="max-w-md space-y-5">
          <div
            class="mx-auto h-14 w-14 animate-spin rounded-full border-4 border-sky-300 border-t-transparent"
          ></div>
          <div>
            <div
              class="text-sm font-semibold uppercase tracking-[0.28em] text-sky-300"
            >
              Syncing workspace
            </div>
            <div class="mt-2 text-2xl font-semibold tracking-tight">
              Loading Wiley Widget
            </div>
            <div class="mt-3 text-sm leading-6 text-slate-300">
              Restoring the live rate study, customer directory, and scenario
              state.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="_content/Syncfusion.Blazor.Core/scripts/syncfusion-blazor.min.js"></script>
    <script src="_content/Syncfusion.Blazor.Charts/scripts/sf-chart.min.js"></script>
    <script src="_content/Syncfusion.Blazor.Grid/scripts/sf-grid.min.js"></script>
    <script src="_content/Syncfusion.Blazor.Spreadsheet/scripts/syncfusion-blazor-spreadsheet.min.js"></script>
    <script src="js/workspace-storage.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
  </body>
</html>
